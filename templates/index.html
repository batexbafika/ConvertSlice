<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ConvertSlice</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="app">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
    <h2>📄 ConvertSlice</h2>

    <a href="/" class="active">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/about">About</a>

    <div class="sidebar-footer">
        <strong>ConvertSlice</strong><br>
        <small>A Multi-Tool PDF System</small><br><br>
        <small>Developed by</small><br>
        <strong>Batex Bafika</strong>
    </div>
</div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <div class="header">
            <h1>Document Processor</h1>
            <p>Convert, slice and transform files instantly</p>
        </div>

        <div class="card">

            <form id="toolForm" method="POST" action="/process" enctype="multipart/form-data">

                <label>Select Tool</label>
                <select name="mode">
                    <option value="slice">Slice PDF</option>
                    <option value="pdf_to_word">PDF → Word</option>
                    <option value="word_to_pdf">Word → PDF</option>
                </select>


                <label>Upload File</label>
                <input type="file" name="file" required>

                <label>Pages (only for slicing)</label>
                <input type="text" name="pages" placeholder="e.g 1,3,7-10">

                <button type="submit">Process Document</button>

                <!-- LOADER -->
                <div id="loader">
                    <div class="spinner"></div>
                    <p>Processing...</p>
                </div>

            </form>

        </div>

    </div>

</div>

<script>
document.getElementById("toolForm").addEventListener("submit", function () {
    document.getElementById("loader").style.display = "block";
});
</script>

</body>
</html>
